version: '3.8'

services:
  # --- 1. Database PostgreSQL Lokal ---
  db:
    image: postgres:15-alpine
    container_name: edupay-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rahasia123}
      POSTGRES_DB: ${DB_NAME:-edupay}
    volumes:
      # Data akan disimpan di dalam volume Docker agar tidak hilang walau Mini PC direstart
      - edupay-db-data:/var/lib/postgresql/data
    networks:
      - edupay-network

  # --- 2. Adminer (Pengelola Database Berbasis Web) ---
  adminer:
    image: adminer
    container_name: edupay-adminer
    restart: unless-stopped
    ports:
      # Buka browser Mini PC di http://localhost:8080 untuk mengelola database
      - "8080:8080"
    depends_on:
      - db
    networks:
      - edupay-network

  # --- 3. Backend Node.js API ---
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: edupay-api
    restart: unless-stopped
    environment:
      # API otomatis menyusun URL koneksi menggunakan variabel dari .env
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-rahasia123}@db:5432/${DB_NAME:-edupay}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-edupay-pro-secret-change-me-in-production}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost}
      - NODE_ENV=production
    depends_on:
      - db
    networks:
      - edupay-network

  # --- 4. Frontend React + Nginx Proxy ---
  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    container_name: edupay-dashboard
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - edupay-network

networks:
  edupay-network:
    driver: bridge

# Menyediakan penyimpanan permanen untuk database
volumes:
  edupay-db-data:
